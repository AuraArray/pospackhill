<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kasir Pakchill</title>
</head>
<body>

    <!-- SECTION 1: LAYAR LOGIN -->
    <section id="login-screen">
        <h1>Login Pakchill</h1>
        <input type="password" id="login-password" placeholder="Masukkan Password">
        <button id="btn-login">Masuk</button>
        <p>Petunjuk: Kasir (123) | Owner (000)</p>
    </section>

    <!-- SECTION 2: AREA APLIKASI UTAMA (Disembunyikan sebelum login) -->
    <main id="main-app" style="display:none;">
        
        <!-- Navigasi -->
        <nav>
            <h2 id="brand-name">PAKCHILL POS</h2>
            <div id="nav-links">
                <button id="nav-to-kasir">Menu Kasir</button>
                <button id="nav-to-owner" style="display:none;">Menu Owner</button>
                <button id="btn-logout">Keluar</button>
            </div>
        </nav>

        <hr>

        <!-- HALAMAN KASIR -->
        <section id="page-kasir">
            <h3>Terminal Kasir</h3>
            
            <!-- Pilihan Produk -->
            <div id="product-list">
                <button id="add-pachoy">Tambah PACHOY (15rb)</button>
                <button id="add-nanas">Tambah NANAS (12rb)</button>
            </div>

            <!-- Detail Pesanan -->
            <div id="order-details">
                <h4>Keranjang Belanja</h4>
                <ul id="cart-list">
                    <!-- Item yang dibeli akan muncul di sini via JS -->
                </ul>
                <p>Subtotal: <span id="display-subtotal">0</span></p>
                
                <!-- Fitur Diskon & Voucher -->
                <label>Diskon/Voucher (Rp):</label>
                <input type="number" id="input-discount" value="0">
                
                <h4>Total Tagihan: <span id="display-total">0</span></h4>
            </div>

            <!-- Data Pelanggan & Bayar -->
            <div id="checkout-form">
                <input type="text" id="customer-name" placeholder="Nama Pelanggan">
                <input type="email" id="customer-email" placeholder="Email Pelanggan">
                
                <select id="payment-method">
                    <option value="Cash">Tunai (Cash)</option>
                    <option value="QRIS">QRIS</option>
                </select>

                <button id="btn-pay">BAYAR & KIRIM STRUK</button>
                <button id="btn-compliment">COMPLIMENT (GRATIS)</button>
            </div>
        </section>

        <!-- HALAMAN OWNER -->
        <section id="page-owner" style="display:none;">
            <h3>Dashboard Owner</h3>
            
            <!-- Ringkasan Angka -->
            <div id="stats-summary">
                <div>
                    <p>Omzet Hari Ini</p>
                    <h2 id="total-revenue">0</h2>
                </div>
                <div>
                    <p>Total Transaksi</p>
                    <h2 id="transaction-count">0</h2>
                </div>
            </div>

            <!-- Tombol Backup 24 Jam -->
            <button id="btn-download-backup">DOWNLOAD LAPORAN (CSV)</button>

            <!-- Grafik Penjualan (Akan diisi Chart.js) -->
            <div id="chart-container">
                <canvas id="sales-chart"></canvas>
            </div>

            <!-- Riwayat & Fitur VOID -->
            <div id="transaction-history">
                <h4>Riwayat Penjualan</h4>
                <table border="1" width="100%">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Pelanggan</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        <!-- Data dari LocalStorage muncul di sini -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

</body>
</html>
